version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: leadflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leadflow_db
  redis:
    image: redis:7-alpine
    container_name: leadflow-redis
    ports:
      - "6379:6379"
